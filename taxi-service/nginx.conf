events {
    worker_connections 1024;
}

http {
    upstream input_service {
        server input-service:8081;
    }

    upstream order_service {
        server order-service:8082;
    }

    upstream match_service {
        server match-service:8083;
    }

    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /ping {
            access_log off;
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }

        location /swagger/ {
            alias /usr/share/nginx/html/swagger/;
            index index.html;
            try_files $uri $uri/ /swagger/index.html;
        }

        location /openapi.yaml {
            alias /usr/share/nginx/html/openapi.yaml;
            default_type application/yaml;
        }

        location /api/users {
            proxy_pass http://input_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location /api/auth {
            proxy_pass http://input_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location /api/drivers {
            proxy_pass http://input_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location ~ ^/api/orders/[0-9]+/accept$ {
            proxy_pass http://match_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location ~ ^/api/orders/[0-9]+/complete$ {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location ~ ^/api/users/[0-9]+/orders$ {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }

        location /api/orders {
            set $orders_backend order_service;
            if ($request_method = GET) {
                set $orders_backend match_service;
            }

            proxy_pass http://$orders_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header Content-Type;
            add_header Content-Type application/json always;
        }
    }
}
