components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000

    task_processors:
        main-task-processor:
            worker_threads: 4
            thread_name: main-worker
        fs-task-processor:
            worker_threads: 2
            thread_name: fs-worker

    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: 8082
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        testsuite-support: {}

        taxi-jwt-auth:
            secret: taxi-secret-key-change-in-production

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-create-order:
            path: /api/orders
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                    - taxi-jwt

        handler-get-user-orders:
            path: /api/users/{user_id}/orders
            method: GET
            task_processor: main-task-processor
            auth:
                types:
                    - taxi-jwt

        handler-complete-order:
            path: /api/orders/{order_id}/complete
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                    - taxi-jwt
