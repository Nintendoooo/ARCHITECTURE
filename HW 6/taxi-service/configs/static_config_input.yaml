components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000

    task_processors:
        main-task-processor:
            worker_threads: 4
            thread_name: main-worker
        fs-task-processor:
            worker_threads: 2
            thread_name: fs-worker

    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: 8081
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        testsuite-support: {}

        dns-client:
            fs-task-processor: fs-task-processor

        secdist:
            load-enabled: true

        default-secdist-provider:
            config: /etc/taxi_service/secure_data.json
            missing-ok: true
            environment-secrets-key: SECDIST_CONFIG

        # MongoDB configuration
        mongo-db: {}

        # Cache component
        cache: {}

        # Rate limiter component
        rate-limiter: {}

        taxi-jwt-auth:
            secret: taxi-secret-key-change-in-production

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        # Metrics handler
        metrics:
            path: /metrics
            method: GET
            task_processor: main-task-processor

        handler-create-user:
            path: /api/users
            method: POST
            task_processor: main-task-processor

        handler-login:
            path: /api/auth/login
            method: POST
            task_processor: main-task-processor

        handler-find-users:
            path: /api/users
            method: GET
            task_processor: main-task-processor

        handler-register-driver:
            path: /api/drivers
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                    - jwt-auth

        my-rabbit:
            secdist_alias: taxi-rabbit-alias
            min_pool_size: 5
            max_pool_size: 10
            max_in_flight_requests: 5
            use_secure_connection: false

        taxi-event-producer:
            rabbit_name: my-rabbit
