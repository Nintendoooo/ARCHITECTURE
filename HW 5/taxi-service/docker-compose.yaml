services:
  mongodb:
    image: mongo:7.0
    container_name: taxi-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: taxi_user
      MONGO_INITDB_ROOT_PASSWORD: taxi_pass
      MONGO_INITDB_DATABASE: taxi_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taxi-network
    restart: unless-stopped

  input-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-input-service
    command: ["/app/taxi-service-input", "--config", "/app/configs/static_config_input.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./configs/static_config_input.yaml:/app/configs/static_config_input.yaml:ro
    environment:
      MONGO_URI: mongodb://taxi_user:taxi_pass@mongodb:27017/taxi_db
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-order-service
    command: ["/app/taxi-service-order", "--config", "/app/configs/static_config_order.yaml"]
    ports:
      - "8082:8082"
    volumes:
      - ./configs/static_config_order.yaml:/app/configs/static_config_order.yaml:ro
    environment:
      MONGO_URI: mongodb://taxi_user:taxi_pass@mongodb:27017/taxi_db
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  match-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-match-service
    command: ["/app/taxi-service-match", "--config", "/app/configs/static_config_match.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - ./configs/static_config_match.yaml:/app/configs/static_config_match.yaml:ro
    environment:
      MONGO_URI: mongodb://taxi_user:taxi_pass@mongodb:27017/taxi_db
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: taxi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - input-service
      - order-service
      - match-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - taxi-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: taxi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taxi-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: taxi-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-network
    restart: unless-stopped

networks:
  taxi-network:
    driver: bridge

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
